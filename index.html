<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メッセージシステム - ホーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 20px;
            margin-bottom: 60px;
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn {
            background: white;
            color: #667eea;
            padding: 30px 40px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 24px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(-2px);
        }
        
        .icon {
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 メッセージシステム</h1>
        <p class="subtitle">ページを選択してください</p>
        
        <div class="button-container">
            <a href="input.html" class="btn">
                <span class="icon">✏️</span>
                メッセージ入力ページ
            </a>
            
            <a href="output.html" class="btn">
                <span class="icon">👀</span>
                メッセージ表示ページ
            </a>
        </div>
    </div>
</body>
</html>
